function ScenarioTab({ campaigns }) {
  const voiceCamps = campaigns.filter(c => c.model !== "msgs");
  const [campIdx, setCampIdx] = useState(0);
  const camp = voiceCamps[campIdx] || voiceCamps[0];
  const [dayS, setDayS] = useState("lunes");

  const [ahtA, setAhtA] = useState(camp?.params.aht || 300);
  const [slA, setSlA] = useState(Math.round((camp?.params.targetSL || .8) * 100));
  const [shrA, setShrA] = useState(camp?.params.shrinkage || 15);

  const [ahtB, setAhtB] = useState((camp?.params.aht || 300) + 60);
  const [slB, setSlB] = useState(Math.round((camp?.params.targetSL || .8) * 100));
  const [shrB, setShrB] = useState((camp?.params.shrinkage || 15) + 5);

  if (!camp) return <div style={{ ...card, padding: 20 }}>No hay campañas de voz para comparar. Agrega una campaña Erlang C o Erlang A.</div>;

  const resA = HOURS.map((_, i) => findAgentsErlangC(camp.data[dayS]?.[i] || 0, ahtA, slA / 100, camp.params.targetTime, shrA));
  const resB = HOURS.map((_, i) => findAgentsErlangC(camp.data[dayS]?.[i] || 0, ahtB, slB / 100, camp.params.targetTime, shrB));

  return (
    <>
      <h2 style={{ fontFamily: fontH, fontSize: 15, fontWeight: 600, margin: "0 0 14px" }}>🔀 Comparativa de Escenarios</h2>
      <div style={{ display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap" }}>
        <div><label style={lbl}>Campaña</label><select value={campIdx} onChange={e => setCampIdx(+e.target.value)} style={sel}>{voiceCamps.map((c, i) => <option key={i} value={i}>{c.name}</option>)}</select></div>
        <div><label style={lbl}>Día</label><select value={dayS} onChange={e => setDayS(e.target.value)} style={sel}>{DAYS.map(d => <option key={d} value={d}>{d}</option>)}</select></div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
        <div style={{ ...card, padding: 14, marginBottom: 0, borderColor: C.bl }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.bl, marginBottom: 10, fontFamily: fontH }}>🅰 Escenario A (Actual)</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            <PI label="AHT (seg)" value={ahtA} set={setAhtA} />
            <PI label="SL (%)" value={slA} set={setSlA} />
            <PI label="Shrinkage (%)" value={shrA} set={setShrA} />
          </div>
        </div>
        <div style={{ ...card, padding: 14, marginBottom: 0, borderColor: C.o }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.o, marginBottom: 10, fontFamily: fontH }}>🅱 Escenario B (Alternativo)</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            <PI label="AHT (seg)" value={ahtB} set={setAhtB} />
            <PI label="SL (%)" value={slB} set={setSlB} />
            <PI label="Shrinkage (%)" value={shrB} set={setShrB} />
          </div>
        </div>
      </div>

      <div style={{ ...card, padding: 14, overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr>
            <th style={th}>Hora</th><th style={th}>Vol</th>
            <th style={{ ...th, color: C.bl }}>Ag. A</th><th style={{ ...th, color: C.bl }}>SL A</th><th style={{ ...th, color: C.bl }}>Ocp A</th>
            <th style={{ ...th, color: C.o }}>Ag. B</th><th style={{ ...th, color: C.o }}>SL B</th><th style={{ ...th, color: C.o }}>Ocp B</th>
            <th style={th}>Δ Ag</th>
          </tr></thead>
          <tbody>
            {HOURS.map((h, i) => {
              const vol = camp.data[dayS]?.[i] || 0;
              const diff = resB[i].agents - resA[i].agents;
              return (
                <tr key={h} style={{ borderBottom: `1px solid ${C.bd}22` }}>
                  <td style={td}>{String(h).padStart(2, "0")}:00</td>
                  <td style={td}>{vol}</td>
                  <td style={{ ...td, color: C.bl, fontWeight: 600 }}>{resA[i].agents}</td>
                  <td style={{ ...td, color: resA[i].sl >= .8 ? C.ac : C.r, fontSize: 11 }}>{(resA[i].sl * 100).toFixed(1)}%</td>
                  <td style={{ ...td, fontSize: 11 }}>{(resA[i].occ * 100).toFixed(1)}%</td>
                  <td style={{ ...td, color: C.o, fontWeight: 600 }}>{resB[i].agents}</td>
                  <td style={{ ...td, color: resB[i].sl >= .8 ? C.ac : C.r, fontSize: 11 }}>{(resB[i].sl * 100).toFixed(1)}%</td>
                  <td style={{ ...td, fontSize: 11 }}>{(resB[i].occ * 100).toFixed(1)}%</td>
                  <td style={{ ...td, fontWeight: 700, color: diff > 0 ? C.r : diff < 0 ? C.ac : C.tD }}>{diff > 0 ? "+" : ""}{diff}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════
//  TAB 5: INVERSA
// ═══════════════════════════════════════════════════════
function InverseTab() {
  const [agents, setAgents] = useState(10);
  const [calls, setCalls] = useState(50);
  const [aht, setAht] = useState(300);
  const [tgtTime, setTgtTime] = useState(30);
  const [model, setModel] = useState("erlangC");
  const [patience, setPatience] = useState(120);

  const result = inverseSL(agents, calls, aht, tgtTime, model, patience);
  const erlangs = (calls * aht) / 3600;

  // Curve: vary agents from max(1, erlangs-2) to erlangs+15
  const minN = Math.max(1, Math.floor(erlangs));
  const curve = Array.from({ length: 20 }, (_, i) => {
    const n = minN + i;
    const r = inverseSL(n, calls, aht, tgtTime, model, patience);
    return { n, ...r };
  });
  const maxSL = 1;

  return (
    <>
      <h2 style={{ fontFamily: fontH, fontSize: 15, fontWeight: 600, margin: "0 0 14px" }}>🔄 Calculadora Inversa: Agentes → SL</h2>
      <p style={{ fontSize: 12, color: C.tD, marginBottom: 14 }}>Dado un número de agentes, ¿qué nivel de servicio alcanzo? Útil para justificar contrataciones o evaluar impacto de reducción de personal.</p>

      <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 14 }}>
        <PI label="Agentes" value={agents} set={setAgents} />
        <PI label="Llamadas/Hora" value={calls} set={setCalls} />
        <PI label="AHT (seg)" value={aht} set={setAht} />
        <PI label="T. Espera (seg)" value={tgtTime} set={setTgtTime} />
        <div><label style={lbl}>Modelo</label><select value={model} onChange={e => setModel(e.target.value)} style={sel}><option value="erlangC">Erlang C</option><option value="erlangA">Erlang A</option></select></div>
        {model === "erlangA" && <PI label="Paciencia (seg)" value={patience} set={setPatience} />}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 10, marginBottom: 14 }}>
        {[
          { label: "Nivel de Servicio", val: (result.sl * 100).toFixed(1) + "%", color: result.sl >= .8 ? C.ac : result.sl >= .6 ? C.w : C.r },
          { label: "Ocupación", val: (result.occ * 100).toFixed(1) + "%", color: result.occ > .85 ? C.r : result.occ > .7 ? C.w : C.ac },
          { label: "ASA (seg)", val: result.asa < 999 ? result.asa.toFixed(1) : "∞", color: C.bl },
          { label: "Tráfico (Erlangs)", val: erlangs.toFixed(2), color: C.p },
        ].map((k, i) => (
          <div key={i} style={{ ...card, padding: "12px 14px", marginBottom: 0 }}>
            <div style={{ fontSize: 10, color: C.tM, marginBottom: 4, textTransform: "uppercase" }}>{k.label}</div>
            <div style={{ fontSize: 24, fontWeight: 700, color: k.color, fontFamily: fontH }}>{k.val}</div>
          </div>
        ))}
      </div>

      {/* SL Curve chart */}
      <div style={{ ...card, padding: 16 }}>
        <h3 style={{ fontFamily: fontH, fontSize: 13, fontWeight: 600, margin: "0 0 10px", color: C.tD }}>📈 Curva SL vs Agentes</h3>
        <div style={{ position: "relative", height: 200, display: "flex", alignItems: "flex-end", gap: 4 }}>
          {/* 80% line */}
          <div style={{ position: "absolute", bottom: "80%", left: 0, right: 0, borderTop: `1px dashed ${C.ac}44`, zIndex: 1 }}>
            <span style={{ position: "absolute", right: 0, top: -14, fontSize: 9, color: C.ac }}>80% SL</span>
          </div>
          {curve.map((c, i) => (
            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
              <span style={{ fontSize: 8, color: c.n === agents ? C.ac : C.tM }}>{(c.sl * 100).toFixed(0)}%</span>
              <div style={{
                width: "100%", height: `${c.sl * 100}%`, minHeight: 2,
                background: c.n === agents ? C.ac : c.sl >= .8 ? `${C.ac}88` : c.sl >= .6 ? `${C.w}88` : `${C.r}88`,
                borderRadius: "3px 3px 0 0", border: c.n === agents ? `2px solid ${C.ac}` : "none",
              }} />
              <span style={{ fontSize: 9, color: c.n === agents ? C.ac : C.tM, fontWeight: c.n === agents ? 700 : 400 }}>{c.n}</span>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════
//  TAB 6: EXPORTAR
// ═══════════════════════════════════════════════════════
function ExportTab({ allResults }) {
  const [selIdx, setSelIdx] = useState(0);
  const { camp, results } = allResults[selIdx] || allResults[0];
  const isV = camp.model !== "msgs";

  const generateCSV = () => {
    let csv = "Día,Hora," + (isV ? "Llamadas" : "Mensajes") + ",Agentes_Req,Sin_Shrinkage";
    if (isV) csv += ",SL,Ocupacion,ASA";
    csv += "\n";
    DAYS.forEach(d => {
      HOURS.forEach((h, i) => {
        const r = results[d]?.[i] || {};
        const vol = camp.data[d]?.[i] || 0;
        csv += `${d},${String(h).padStart(2, "0")}:00,${vol},${r.agents || 0},${r.raw || 0}`;
        if (isV) csv += `,${((r.sl || 0) * 100).toFixed(1)}%,${((r.occ || 0) * 100).toFixed(1)}%,${r.asa < 999 ? r.asa?.toFixed(1) : "N/A"}`;
        csv += "\n";
      });
    });
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8,\uFEFF" + encodeURIComponent(csv);
    a.download = `WFM_${camp.name.replace(/\s+/g, "_")}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  const generateAllCSV = () => {
    let csv = "Campaña,Modelo,Día,Hora,Volumen,Agentes_Req,Sin_Shrinkage\n";
    allResults.forEach(({ camp: c, results: r }) => {
      DAYS.forEach(d => {
        HOURS.forEach((h, i) => {
          const res = r[d]?.[i] || {};
          csv += `${c.name},${c.model},${d},${String(h).padStart(2, "0")}:00,${c.data[d]?.[i] || 0},${res.agents || 0},${res.raw || 0}\n`;
        });
      });
    });
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8,\uFEFF" + encodeURIComponent(csv);
    a.download = "WFM_Todas_Campanas.csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  return (
    <>
      <h2 style={{ fontFamily: fontH, fontSize: 15, fontWeight: 600, margin: "0 0 14px" }}>📥 Exportar Datos</h2>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <div style={{ ...card, padding: 20, marginBottom: 0 }}>
          <h3 style={{ fontFamily: fontH, fontSize: 14, fontWeight: 600, margin: "0 0 8px", color: C.bl }}>Exportar Campaña Individual</h3>
          <div style={{ marginBottom: 12 }}>
            <label style={lbl}>Seleccionar campaña</label>
            <select value={selIdx} onChange={e => setSelIdx(+e.target.value)} style={sel}>
              {allResults.map((r, i) => <option key={i} value={i}>{r.camp.name}</option>)}
            </select>
          </div>
          <p style={{ fontSize: 11, color: C.tD, marginBottom: 12 }}>Exporta los volúmenes, agentes requeridos, SL, ocupación y ASA para todos los días y horas de la campaña seleccionada.</p>
          <button onClick={generateCSV} style={{ padding: "10px 24px", borderRadius: 8, border: "none", background: C.bl, color: C.bg, fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: font }}>
            ⬇ Descargar CSV — {camp.name}
          </button>
        </div>
        <div style={{ ...card, padding: 20, marginBottom: 0 }}>
          <h3 style={{ fontFamily: fontH, fontSize: 14, fontWeight: 600, margin: "0 0 8px", color: C.ac }}>Exportar Todas las Campañas</h3>
          <p style={{ fontSize: 11, color: C.tD, marginBottom: 12 }}>Genera un CSV consolidado con todas las campañas, modelos, volúmenes y agentes requeridos. Ideal para importar en Power BI o Excel.</p>
          <button onClick={generateAllCSV} style={{ padding: "10px 24px", borderRadius: 8, border: "none", background: C.ac, color: C.bg, fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: font }}>
            ⬇ Descargar CSV — Todas
          </button>
        </div>
      </div>
      <div style={{ ...card, padding: 16, marginTop: 14 }}>
        <h3 style={{ fontFamily: fontH, fontSize: 13, fontWeight: 600, margin: "0 0 8px", color: C.tD }}>💡 Tips de Exportación</h3>
        <div style={{ fontSize: 12, color: C.tD, lineHeight: 1.7 }}>
          • Los archivos CSV se generan con codificación UTF-8 BOM para compatibilidad con Excel en español.<br />
          • Puedes abrir directamente en Excel, Google Sheets o importar en Power BI.<br />
          • El separador es coma (,). Si Excel no lo reconoce, usa la opción "Datos → Obtener datos → De archivo CSV".<br />
          • Los porcentajes de SL y Ocupación se exportan con el símbolo %, conviértelos a número si necesitas hacer cálculos.
        </div>
      </div>
    </>
  );
}

    { t: "6. Calculadora Inversa (🔄)", c: "Dado un número fijo de agentes, calcula qué SL, ocupación y ASA se alcanza. Incluye curva visual de SL vs número de agentes.\n\nIdeal para: justificar contrataciones ante dirección, evaluar impacto de reducción de personal, o responder '¿con 8 agentes qué servicio damos?'" },
    { t: "7. Exportar (📥)", c: "Genera archivos CSV (compatibles con Excel y Power BI) con los resultados de una campaña individual o todas las campañas consolidadas. Los archivos incluyen codificación UTF-8 BOM para soporte correcto de caracteres en español." },
    { t: "8. Semáforo de Indicadores", c: "Los colores en SL y Ocupación funcionan como semáforo:\n\n• Verde (✅): SL ≥ 80% | Ocupación < 70%\n• Amarillo (⚠️): SL 60–80% | Ocupación 70–85%\n• Rojo (🔴): SL < 60% | Ocupación > 85%\n\nUna ocupación sostenida > 85% genera burnout. El rango ideal es 70–85%." },
    { t: "9. Fórmulas Utilizadas", c: "• Erlangs = (Llamadas × AHT) / 3600\n• Erlang C P(w) = probabilidad de espera en cola\n• SL = 1 − P(w) × e^(−(N−A) × t/AHT)\n• Ocupación = Erlangs / N agentes\n• ASA = P(w) × AHT / (N − A)\n• Agentes con shrinkage = Agentes netos / (1 − shrinkage%)\n• Mensajes: Agentes = Volumen / (Msgs por agente por hora)" },
  ];
  return (
    <>
      <h2 style={{ fontFamily: fontH, fontSize: 15, fontWeight: 600, margin: "0 0 14px" }}>📖 Manual de Uso Completo</h2>
      {sections.map((s, i) => (
        <div key={i} style={{ ...card, padding: "14px 18px" }}>
          <h3 style={{ fontFamily: fontH, fontSize: 14, color: C.t, marginTop: 0, marginBottom: 6 }}>{s.t}</h3>
          <pre style={{ color: C.tD, fontSize: 12, margin: 0, whiteSpace: "pre-wrap", lineHeight: 1.6, fontFamily: font }}>{s.c}</pre>
        </div>
      ))}
    </>
  );
}
